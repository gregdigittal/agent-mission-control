<!--
  Agent Mission Control — Personal Dashboard

  Quick start:
    cd /path/to/dashboard
    python3 -m http.server 8080
    # Access at http://your-vps-ip:8080

  Or with nginx:
    server {
      listen 8080;
      root /path/to/dashboard;
      index index.html;
    }

  Configure Supabase (optional):
    Edit SUPABASE_URL and SUPABASE_ANON_KEY below
-->
<!DOCTYPE html>
<html lang="en" class="screen-desktop">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Agent Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* === RESET & BASE === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:var(--font-base);-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg-0);color:var(--text-0);overflow:hidden;height:100vh;width:100vw;position:relative}
code,pre,.mono{font-family:'JetBrains Mono',monospace}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select{font:inherit;color:inherit;background:var(--bg-3);border:1px solid var(--border-1);border-radius:4px;padding:4px 8px}
:focus-visible{outline:1px solid var(--cyan);outline-offset:2px}
a{color:var(--cyan);text-decoration:none}

/* === COLOR PALETTE === */
:root{
  --bg-0:#06080c;--bg-1:#0b0e14;--bg-2:#10141c;--bg-3:#161b26;--bg-4:#1c2232;--bg-5:#242b3d;
  --border-0:#1a2030;--border-1:#242e42;--border-2:#2e3a52;
  --text-0:#edf0f7;--text-1:#b0b8cc;--text-2:#6e7a94;--text-3:#3e4a64;
  --cyan:#22d3ee;--green:#34d399;--amber:#fbbf24;--red:#f87171;--violet:#a78bfa;--blue:#60a5fa;--rose:#fb7185;
  --session-colors: cyan,green,violet,amber,rose,blue;
}

/* === SCREEN PROFILES === */
html.screen-mobile{
  --density-pad:8px;--density-gap:6px;--pane-min:100%;--topbar-h:48px;
  --font-base:14px;--font-sm:12px;--font-xs:11px;--font-xxs:10px;
  --card-pad:12px;--kb-col-w:calc(100vw - 32px);
  --bb-stage-size:14px;--bb-ring-size:48px;--bb-stat-size:14px;
  --bottomnav-h:56px;--tap-target:44px;
}
html.screen-laptop{
  --density-pad:10px;--density-gap:7px;--pane-min:320px;--topbar-h:36px;
  --font-base:12px;--font-sm:10px;--font-xs:9px;--font-xxs:8px;
  --card-pad:8px 10px;--kb-col-w:180px;
  --bb-stage-size:15px;--bb-ring-size:42px;--bb-stat-size:15px;
}
html.screen-desktop{
  --density-pad:14px;--density-gap:10px;--pane-min:360px;--topbar-h:40px;
  --font-base:13px;--font-sm:11px;--font-xs:10px;--font-xxs:9px;
  --card-pad:12px 14px;--kb-col-w:210px;
  --bb-stage-size:17px;--bb-ring-size:54px;--bb-stat-size:17px;
}
html.screen-ultrawide{
  --density-pad:18px;--density-gap:12px;--pane-min:400px;--topbar-h:44px;
  --font-base:14px;--font-sm:12px;--font-xs:11px;--font-xxs:10px;
  --card-pad:14px 16px;--kb-col-w:240px;
  --bb-stage-size:20px;--bb-ring-size:62px;--bb-stat-size:20px;
}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg-1)}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}
html.screen-mobile ::-webkit-scrollbar{display:none}

/* === TOPBAR === */
#topbar{
  height:var(--topbar-h);display:flex;align-items:center;gap:10px;
  padding:0 var(--density-pad);background:var(--bg-1);border-bottom:1px solid var(--border-0);
  position:relative;z-index:100;
}
#topbar .logo{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--cyan);font-size:var(--font-sm);white-space:nowrap;letter-spacing:0.5px}
#topbar .logo span{color:var(--text-2);font-weight:400}
.live-badge{display:inline-flex;align-items:center;gap:4px;font-size:var(--font-xxs);color:var(--green);text-transform:uppercase;letter-spacing:1px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.topbar-spacer{flex:1}
.topbar-group{display:flex;align-items:center;gap:6px}
.topbar-btn{
  padding:3px 8px;border-radius:4px;font-size:var(--font-xs);
  background:var(--bg-3);border:1px solid var(--border-1);color:var(--text-1);
  transition:all .15s;
}
.topbar-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.topbar-btn.active{background:var(--cyan);color:var(--bg-0);border-color:var(--cyan)}
.topbar-select{
  font-size:var(--font-xs);background:var(--bg-3);border:1px solid var(--border-1);
  color:var(--text-1);padding:3px 6px;border-radius:4px;
}

/* === HAMBURGER (mobile) === */
.hamburger{display:none;width:var(--tap-target,36px);height:var(--tap-target,36px);align-items:center;justify-content:center;font-size:18px;color:var(--text-1)}
html.screen-mobile .hamburger{display:flex}
html.screen-mobile .topbar-desktop{display:none}
.mobile-menu{
  display:none;position:fixed;top:var(--topbar-h);left:0;right:0;bottom:0;
  background:rgba(6,8,12,.95);z-index:200;padding:var(--density-pad);
  flex-direction:column;gap:12px;overflow-y:auto;
}
.mobile-menu.open{display:flex}
.mobile-menu label{font-size:var(--font-sm);color:var(--text-2);display:block;margin-bottom:4px}
.mobile-menu select,.mobile-menu button{width:100%;padding:10px;font-size:var(--font-base);border-radius:6px}
.mobile-menu button{background:var(--bg-4);border:1px solid var(--border-1);text-align:left;color:var(--text-0)}

/* === SESSION TABS === */
.session-tabs{display:flex;gap:2px;align-items:center}
.session-tab{
  padding:3px 10px;border-radius:4px 4px 0 0;font-size:var(--font-xs);font-weight:500;
  border:1px solid var(--border-1);border-bottom:none;color:var(--text-2);
  background:var(--bg-2);position:relative;display:flex;align-items:center;gap:4px;
}
.session-tab.active{color:var(--text-0);background:var(--bg-3);border-color:var(--border-2)}
.session-tab .dot{width:6px;height:6px;border-radius:50%}
.session-tab .close-tab{font-size:9px;opacity:.5;margin-left:4px}
.session-tab .close-tab:hover{opacity:1;color:var(--red)}
.add-session{font-size:var(--font-xs);padding:3px 8px;color:var(--text-3)}
.add-session:hover{color:var(--cyan)}
html.screen-mobile .session-tabs{display:none}

/* === MAIN LAYOUT === */
#main{
  display:flex;height:calc(100vh - var(--topbar-h));overflow:hidden;
}
html.screen-mobile #main{height:calc(100vh - var(--topbar-h) - var(--bottomnav-h))}

/* === PANES === */
.pane{
  flex:1;min-width:var(--pane-min);display:flex;flex-direction:column;
  border-right:1px solid var(--border-0);overflow:hidden;
}
.pane:last-child{border-right:none}
.pane-header{
  display:flex;align-items:center;gap:6px;padding:4px var(--density-pad);
  background:var(--bg-2);border-bottom:1px solid var(--border-0);min-height:28px;
}
.pane-tab{
  font-size:var(--font-xs);padding:2px 8px;border-radius:3px;color:var(--text-2);
}
.pane-tab.active{background:var(--bg-4);color:var(--text-0)}
.pane-tab:hover{color:var(--text-1)}
.pane-session-select{margin-left:auto;font-size:var(--font-xxs)}
.pane-body{flex:1;overflow-y:auto;padding:var(--density-pad)}
html.screen-mobile .pane-header{display:none}

/* === BUILD STAGE BANNER === */
.build-banner{
  display:flex;align-items:center;gap:var(--density-gap);padding:var(--card-pad);
  background:var(--bg-2);border:1px solid var(--border-1);border-radius:6px;margin-bottom:var(--density-gap);
}
.build-banner .ring-wrap{position:relative;width:var(--bb-ring-size);height:var(--bb-ring-size);flex-shrink:0}
.build-banner svg.progress-ring{width:100%;height:100%;transform:rotate(-90deg)}
.progress-ring-bg{fill:none;stroke:var(--bg-4);stroke-width:3}
.progress-ring-fg{fill:none;stroke:var(--cyan);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .5s;filter:drop-shadow(0 0 4px var(--cyan))}
.build-banner .ring-pct{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:var(--font-xxs);font-weight:600;color:var(--cyan);
}
.build-banner .stage-name{font-weight:600;font-size:var(--bb-stage-size);color:var(--text-0)}
.build-banner .project-name{font-size:var(--font-xs);color:var(--text-2)}
.build-banner .stats{margin-left:auto;display:flex;gap:12px;font-size:var(--bb-stat-size);font-family:'JetBrains Mono',monospace;color:var(--text-2)}
.build-banner .stats .val{color:var(--text-0);font-weight:500}

/* === PIPELINE ROW === */
.pipeline-row{display:flex;gap:4px;margin-bottom:var(--density-gap);overflow-x:auto;padding-bottom:4px}
.pipeline-stage{
  flex:1;min-width:0;padding:4px 6px;border-radius:4px;text-align:center;
  font-size:var(--font-xxs);font-family:'JetBrains Mono',monospace;
  background:var(--bg-3);border:1px solid var(--border-0);color:var(--text-3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .3s;
}
.pipeline-stage.active{background:var(--bg-4);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 8px rgba(34,211,238,.15)}
.pipeline-stage.done{background:var(--bg-3);border-color:var(--green);color:var(--green);opacity:.7}

/* === AGENT CARDS === */
.agent-grid{display:flex;flex-direction:column;gap:var(--density-gap);margin-bottom:var(--density-gap)}
.agent-card{
  padding:var(--card-pad);background:var(--bg-2);border:1px solid var(--border-1);border-radius:6px;
  display:flex;gap:10px;align-items:flex-start;transition:border-color .2s;
}
.agent-card:hover{border-color:var(--border-2)}
.agent-avatar{font-size:20px;flex-shrink:0;width:32px;text-align:center;line-height:32px}
.agent-info{flex:1;min-width:0}
.agent-name{font-weight:600;font-size:var(--font-sm);display:flex;align-items:center;gap:6px}
.agent-role{font-size:var(--font-xs);color:var(--text-2);margin-top:1px}
.agent-task{font-size:var(--font-xs);color:var(--text-1);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-metrics{display:flex;gap:10px;margin-top:6px;font-size:var(--font-xxs);font-family:'JetBrains Mono',monospace;color:var(--text-2)}
.agent-metrics .metric{display:flex;align-items:center;gap:3px}
.agent-metrics .metric .val{color:var(--text-1)}
.agent-files{margin-top:6px;font-size:var(--font-xxs);color:var(--text-3)}
.agent-files span{color:var(--text-2);font-family:'JetBrains Mono',monospace}
.status-badge{
  font-size:var(--font-xxs);padding:1px 6px;border-radius:3px;font-weight:500;
  text-transform:uppercase;letter-spacing:.5px;
}
.status-leader{background:rgba(34,211,238,.15);color:var(--cyan)}
.status-working{background:rgba(52,211,153,.15);color:var(--green)}
.status-thinking{background:rgba(167,139,250,.15);color:var(--violet)}
.status-idle{background:rgba(110,122,148,.15);color:var(--text-2)}
.status-error{background:rgba(248,113,113,.15);color:var(--red)}
.status-paused{background:rgba(251,191,36,.15);color:var(--amber)}
.status-budget_exceeded{background:rgba(248,113,113,.15);color:var(--red)}

/* collapsible details on mobile */
.agent-details{display:block}
html.screen-mobile .agent-card{flex-wrap:wrap}
html.screen-mobile .agent-details{display:none}
html.screen-mobile .agent-card.expanded .agent-details{display:block;width:100%}

/* === ACTIVITY STREAM === */
.activity-header{display:flex;align-items:center;gap:8px;margin-bottom:var(--density-gap)}
.activity-title{font-size:var(--font-sm);font-weight:600;color:var(--text-1)}
.activity-filters{display:flex;gap:3px;margin-left:auto}
.activity-filter{
  font-size:var(--font-xxs);padding:2px 6px;border-radius:3px;
  color:var(--text-3);background:var(--bg-3);
}
.activity-filter.active{color:var(--text-0);background:var(--bg-4)}
.activity-filter:hover{color:var(--text-1)}
.activity-feed{display:flex;flex-direction:column;gap:2px}
.event-item{
  padding:4px 8px;border-radius:4px;font-size:var(--font-xs);display:flex;
  gap:8px;align-items:baseline;animation:feedIn .3s ease-out;
}
@keyframes feedIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.event-time{font-family:'JetBrains Mono',monospace;font-size:var(--font-xxs);color:var(--text-3);flex-shrink:0}
.event-agent{font-weight:600;font-size:var(--font-xxs);flex-shrink:0}
.event-icon{flex-shrink:0}
.event-desc{color:var(--text-1);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.event-type-tool .event-icon::before{content:'🔧'}
.event-type-file .event-icon::before{content:'📄'}
.event-type-task .event-icon::before{content:'📋'}
.event-type-message .event-icon::before{content:'💬'}
.event-type-thinking .event-icon::before{content:'🧠'}
.event-type-error .event-icon::before{content:'❌'}
.event-type-approval .event-icon::before{content:'✅'}
.event-type-cost .event-icon::before{content:'💰'}
.event-type-permission .event-icon::before{content:'🔐'}
.event-type-spawn .event-icon::before{content:'🚀'}
.event-type-terminate .event-icon::before{content:'⏹️'}

/* === KANBAN BOARD === */
.kanban-board{display:flex;gap:var(--density-gap);height:100%;overflow-x:auto;padding-bottom:8px}
html.screen-mobile .kanban-board{flex-direction:column;overflow-x:visible;gap:12px}
.kanban-column{
  min-width:var(--kb-col-w);max-width:var(--kb-col-w);flex-shrink:0;
  background:var(--bg-2);border:1px solid var(--border-0);border-radius:6px;
  display:flex;flex-direction:column;overflow:hidden;
}
html.screen-mobile .kanban-column{min-width:100%;max-width:100%}
.kanban-col-header{
  padding:8px 10px;font-size:var(--font-sm);font-weight:600;
  border-bottom:1px solid var(--border-0);display:flex;align-items:center;justify-content:space-between;
}
.kanban-col-count{
  font-size:var(--font-xxs);background:var(--bg-4);padding:1px 6px;border-radius:8px;
  font-family:'JetBrains Mono',monospace;color:var(--text-2);
}
.kanban-col-body{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:4px;min-height:60px}
.kanban-col-body.drag-over{background:rgba(34,211,238,.05);border:1px dashed var(--cyan);border-radius:4px}
.kanban-task{
  padding:8px;background:var(--bg-3);border:1px solid var(--border-1);border-radius:4px;
  cursor:grab;transition:all .15s;font-size:var(--font-xs);
}
.kanban-task:active{cursor:grabbing}
.kanban-task:hover{border-color:var(--border-2)}
.kanban-task.dragging{opacity:.5}
.kanban-task-title{font-weight:500;color:var(--text-0);margin-bottom:4px}
.kanban-task-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.kanban-tag{
  font-size:var(--font-xxs);padding:1px 5px;border-radius:3px;
  background:var(--bg-4);color:var(--text-2);
}
.kanban-tag-backend{color:var(--green)}
.kanban-tag-frontend{color:var(--blue)}
.kanban-tag-testing{color:var(--amber)}
.kanban-tag-infra{color:var(--violet)}
.kanban-tag-review{color:var(--cyan)}
.kanban-tag-database{color:var(--rose)}
.kanban-tag-security{color:var(--red)}
.kanban-tag-devops{color:var(--amber)}
.kanban-priority{font-size:var(--font-xxs)}
.kanban-agent{font-size:var(--font-xxs);color:var(--text-3);font-family:'JetBrains Mono',monospace}
.kanban-recommend{
  display:inline-flex;align-items:center;gap:3px;font-size:var(--font-xxs);
  background:rgba(167,139,250,.1);color:var(--violet);padding:1px 5px;border-radius:3px;
}
.kanban-approve-btn{
  margin-top:6px;padding:4px 10px;border-radius:4px;font-size:var(--font-xs);font-weight:600;
  background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3);
  width:100%;
}
html.screen-mobile .kanban-approve-btn{min-height:var(--tap-target);font-size:var(--font-sm)}
.kanban-approve-btn:hover{background:rgba(52,211,153,.25)}

/* === COST VIEW === */
.cost-view{padding:var(--density-pad)}
.cost-card{
  padding:var(--card-pad);background:var(--bg-2);border:1px solid var(--border-1);
  border-radius:6px;margin-bottom:var(--density-gap);
}
.cost-card h3{font-size:var(--font-sm);color:var(--text-1);margin-bottom:8px}
.cost-row{display:flex;justify-content:space-between;padding:4px 0;font-size:var(--font-xs);border-bottom:1px solid var(--border-0)}
.cost-row:last-child{border-bottom:none}
.cost-val{font-family:'JetBrains Mono',monospace;color:var(--cyan)}
.cost-budget-bar{
  height:6px;background:var(--bg-4);border-radius:3px;margin-top:6px;overflow:hidden;
}
.cost-budget-fill{height:100%;border-radius:3px;transition:width .5s}

/* === APPROVAL VIEW === */
.approval-view{padding:var(--density-pad)}
.approval-card{
  padding:var(--card-pad);background:var(--bg-2);border:1px solid var(--border-1);
  border-radius:6px;margin-bottom:var(--density-gap);
}
.approval-card .risk-badge{
  display:inline-block;font-size:var(--font-xxs);padding:2px 8px;border-radius:3px;
  font-weight:600;text-transform:uppercase;letter-spacing:.5px;
}
.risk-green{background:rgba(52,211,153,.15);color:var(--green)}
.risk-yellow{background:rgba(251,191,36,.15);color:var(--amber)}
.risk-red{background:rgba(248,113,113,.15);color:var(--red)}
.approval-desc{font-size:var(--font-sm);color:var(--text-0);margin:8px 0}
.approval-agent{font-size:var(--font-xs);color:var(--text-2);margin-bottom:8px}
.approval-files{font-size:var(--font-xxs);color:var(--text-3);font-family:'JetBrains Mono',monospace;margin-bottom:8px}
.approval-actions{display:flex;gap:8px}
.approval-actions button{
  flex:1;padding:8px;border-radius:6px;font-weight:600;font-size:var(--font-sm);
  border:1px solid transparent;
}
html.screen-mobile .approval-actions button{min-height:var(--tap-target)}
.btn-approve{background:rgba(52,211,153,.15);color:var(--green);border-color:rgba(52,211,153,.3)}
.btn-approve:hover{background:rgba(52,211,153,.25)}
.btn-reject{background:rgba(248,113,113,.15);color:var(--red);border-color:rgba(248,113,113,.3)}
.btn-reject:hover{background:rgba(248,113,113,.25)}
.approval-empty{text-align:center;padding:40px 20px;color:var(--text-3);font-size:var(--font-sm)}

/* === BOTTOM NAV (mobile) === */
#bottomnav{
  display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottomnav-h);
  background:var(--bg-1);border-top:1px solid var(--border-0);
  z-index:100;
}
html.screen-mobile #bottomnav{display:flex}
.bottomnav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;color:var(--text-3);font-size:10px;font-weight:500;
  position:relative;min-height:var(--bottomnav-h);
}
.bottomnav-tab.active{color:var(--cyan)}
.bottomnav-tab .nav-icon{font-size:18px}
.bottomnav-badge{
  position:absolute;top:4px;right:calc(50% - 18px);
  background:var(--red);color:#fff;font-size:8px;font-weight:700;
  min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  padding:0 3px;
}

/* === SCANLINE OVERLAY (desktop only) === */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
}
html.screen-mobile body::after{display:none}

/* === PULL TO REFRESH === */
.ptr-indicator{
  display:none;text-align:center;padding:12px;color:var(--cyan);font-size:var(--font-xs);
}
html.screen-mobile .ptr-indicator.visible{display:block}

/* === UTILITY === */
.hidden{display:none!important}

</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">AMC<span> // Mission Control</span></div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>

  <button class="hamburger" onclick="toggleMobileMenu()">&#9776;</button>

  <div class="topbar-desktop topbar-group">

  <div class="topbar-desktop topbar-group">

    <button class="topbar-btn" onclick="setLayout(3)" data-layout="3">3</button>

  </div>

  <div class="topbar-desktop topbar-group">
    <span style="font-size:var(--font-xxs);color:var(--text-3)">Screen</span>
    <button class="topbar-btn" onclick="setScreen('laptop')" data-screen="laptop">L</button>
    <button class="topbar-btn" onclick="setScreen('desktop')" data-screen="desktop">D</button>
    <button class="topbar-btn" onclick="setScreen('ultrawide')" data-screen="ultrawide">U</button>

</div>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
  <label>Session</label>
  <select id="mobileSessionSelect" onchange="switchSession(this.value)"></select>
  <label>Screen Profile</label>
  <select onchange="setScreen(this.value)">
    <option value="mobile">Mobile</option>
    <option value="laptop">Laptop</option>
    <option value="desktop">Desktop</option>
    <option value="ultrawide">Ultrawide</option>
  </select>
  <label>Data Source</label>
  <select onchange="switchDataSource(this.value)">
    <option value="supabase">Supabase</option>
    <option value="file">File Watch</option>
  </select>
  <button onclick="location.reload()">Reload Dashboard</button>
</div>

<!-- MAIN PANES -->
<div id="main"></div>

<!-- BOTTOM NAV (mobile) -->
<div id="bottomnav">
  <button class="bottomnav-tab active" data-tab="agents" onclick="switchMobileTab('agents')">
    <span class="nav-icon">📊</span>Agents
  </button>
  <button class="bottomnav-tab" data-tab="kanban" onclick="switchMobileTab('kanban')">
    <span class="nav-icon">📋</span>Kanban
  </button>
  <button class="bottomnav-tab" data-tab="costs" onclick="switchMobileTab('costs')">
    <span class="nav-icon">💰</span>Costs
  </button>
  <button class="bottomnav-tab" data-tab="approvals" onclick="switchMobileTab('approvals')">
    <span class="nav-icon">✅</span>Approvals
    <span class="bottomnav-badge hidden" id="approvalBadge">0</span>
  </button>
</div>

<script>
// === CONFIG ===
// Edit SUPABASE_URL and SUPABASE_ANON_KEY below before deploying.
// Find these values in your Supabase project:
//   Settings → API → Project URL  (SUPABASE_URL)
//   Settings → API → anon / public key  (SUPABASE_ANON_KEY)
const SUPABASE_URL = 'https://YOUR_PROJECT_REF.supabase.co';  // TODO: replace with your Supabase project URL
const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';  // TODO: replace with your anon key (Settings → API)
const FILE_POLL_INTERVAL = 3000;

const STAGES = ['Planning','Scaffolding','Backend','Frontend','Integration','Testing','Optimization','Review'];
const COLUMNS = ['backlog','todo','in_progress','done'];
const COLUMN_LABELS = {backlog:'Backlog',todo:'To Do',in_progress:'In Progress',done:'Done'};
const TAGS = ['backend','frontend','testing','infra','review','database','security','devops'];
const PRIORITIES = {high:'🔴',medium:'🟠',low:'🟡'};
const SESSION_COLORS = [
  {name:'cyan',bg:'#22d3ee',fg:'#06080c',dot:'#22d3ee'},
  {name:'green',bg:'#34d399',fg:'#06080c',dot:'#34d399'},
  {name:'violet',bg:'#a78bfa',fg:'#06080c',dot:'#a78bfa'},
  {name:'amber',bg:'#fbbf24',fg:'#06080c',dot:'#fbbf24'},
  {name:'rose',bg:'#fb7185',fg:'#06080c',dot:'#fb7185'},
  {name:'blue',bg:'#60a5fa',fg:'#06080c',dot:'#60a5fa'},
];


// === STATE ===
let state = {
  dataSource: 'supabase',  // supabase | file
  screenProfile: 'desktop',
  layoutCount: 2,
  sessions: [],
  activeSessionId: null,
  activePaneViews: [], // 'agents' | 'kanban' per pane
  mobileTab: 'agents',
  mobileMenuOpen: false,
  activityFilter: 'all',
};

let supabaseClient = null;
let supabaseSubscriptions = [];
let filePollTimer = null;

// === SUPABASE ===
function initSupabase() {
  try {
    if (typeof supabase !== 'undefined' && supabase.createClient) {
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      return true;
    }
  } catch(e) { console.warn('Supabase init failed:', e); }
  return false;
}

async function loadFromSupabase() {
  if (!supabaseClient) return false;
  try {
    const [sessionsRes, agentsRes, eventsRes, tasksRes, approvalsRes] = await Promise.all([
      supabaseClient.from('agent_sessions').select('*').order('created_at', {ascending: false}),
      supabaseClient.from('agents').select('*'),
      supabaseClient.from('events').select('*').order('created_at', {ascending: false}).limit(100),
      supabaseClient.from('kanban_tasks').select('*').order('sort_order'),
      supabaseClient.from('approval_queue').select('*').eq('status', 'pending').order('created_at', {ascending: false}),
    ]);

    if (sessionsRes.error) throw sessionsRes.error;
    if (agentsRes.error) throw agentsRes.error;
    if (eventsRes.error) throw eventsRes.error;
    if (tasksRes.error) throw tasksRes.error;
    if (approvalsRes.error) throw approvalsRes.error;

    const sessions = (sessionsRes.data || []).map((s, i) => {
      const color = SESSION_COLORS[i % SESSION_COLORS.length];
      const sessionAgents = (agentsRes.data || []).filter(a => a.session_id === s.id).map(a => ({
        id: a.id, key: a.agent_key, name: a.name, role: a.role, icon: a.icon || '🤖',
        status: a.status || 'idle', task: a.current_task || '',
        ctx: Number(a.context_usage_pct) || 0, cost: a.cost_cents || 0,
        msgs: a.message_count || 0, files: a.active_files || [],
        budgetLimit: a.budget_limit_cents,
      }));
      const sessionEvents = (eventsRes.data || []).filter(e => e.session_id === s.id).map(e => ({
        id: e.id, type: e.event_type, agent: e.agent_key, desc: e.description,
        file: e.file_path, time: new Date(e.created_at), meta: e.metadata,
      }));
      const sessionTasks = (tasksRes.data || []).filter(t => t.session_id === s.id).map(t => ({
        id: t.id, title: t.title, desc: t.description, tag: t.tag,
        priority: t.priority || 'medium', column: t.column_name || 'backlog',
        agent: t.assigned_agent, recommendation: t.recommendation,
        needsApproval: t.needs_approval, approved: t.approved,
      }));
      const sessionApprovals = (approvalsRes.data || []).filter(a => a.session_id === s.id).map(a => ({
        id: a.id, agent: a.agent_key, desc: a.action_description,
        risk: a.risk_level, files: a.files_affected || [], status: a.status,
        details: a.details, created: new Date(a.created_at),
      }));
      const stages = s.stages && Array.isArray(s.stages) && s.stages.length > 0
        ? s.stages : STAGES.map(name => ({ name }));

      return {
        id: s.id, name: s.name, color, status: s.status || 'active',
        currentStage: s.current_stage_idx || 0, stages,
        projectName: s.build_config?.project || s.name,
        totalTasks: s.total_tasks || 0, completedTasks: s.completed_tasks || 0,
        budgetLimit: s.budget_limit_cents, totalCost: s.total_cost_cents || 0,
        agents: sessionAgents, events: sessionEvents, tasks: sessionTasks,
        approvals: sessionApprovals,
      };
    });

    if (sessions.length > 0) {
      state.sessions = sessions;
      state.activeSessionId = sessions[0].id;
    }
    return true;
  } catch(e) {
    console.warn('Supabase load failed:', e);
    return false;
  }
}

function subscribeRealtime() {
  if (!supabaseClient) return;
  // Clean previous
  supabaseSubscriptions.forEach(s => s.unsubscribe());
  supabaseSubscriptions = [];

  const tables = ['agents','events','kanban_tasks','agent_sessions','approval_queue'];
  tables.forEach(table => {
    const sub = supabaseClient.channel(`public:${table}`)
      .on('postgres_changes', { event: '*', schema: 'public', table }, (payload) => {
        handleRealtimeChange(table, payload);
      })
      .subscribe();
    supabaseSubscriptions.push(sub);
  });
}

function handleRealtimeChange(table, payload) {
  const { eventType, new: newRow, old: oldRow } = payload;
  const session = state.sessions.find(s => s.id === (newRow?.session_id || oldRow?.session_id));
  if (!session && table !== 'agent_sessions') return;

  if (table === 'agents') {
    const agentData = {
      id: newRow.id, key: newRow.agent_key, name: newRow.name, role: newRow.role,
      icon: newRow.icon || '🤖', status: newRow.status || 'idle',
      task: newRow.current_task || '', ctx: Number(newRow.context_usage_pct) || 0,
      cost: newRow.cost_cents || 0, msgs: newRow.message_count || 0,
      files: newRow.active_files || [], budgetLimit: newRow.budget_limit_cents,
    };
    if (eventType === 'INSERT') session.agents.push(agentData);
    else if (eventType === 'UPDATE') {
      const idx = session.agents.findIndex(a => a.id === newRow.id);
      if (idx >= 0) session.agents[idx] = agentData;
    } else if (eventType === 'DELETE') {
      session.agents = session.agents.filter(a => a.id !== oldRow.id);
    }
  } else if (table === 'events' && eventType === 'INSERT') {
    session.events.unshift({
      id: newRow.id, type: newRow.event_type, agent: newRow.agent_key,
      desc: newRow.description, file: newRow.file_path,
      time: new Date(newRow.created_at), meta: newRow.metadata,
    });
    if (session.events.length > 200) session.events.pop();
  } else if (table === 'kanban_tasks') {
    const taskData = {
      id: newRow.id, title: newRow.title, desc: newRow.description, tag: newRow.tag,
      priority: newRow.priority || 'medium', column: newRow.column_name || 'backlog',
      agent: newRow.assigned_agent, recommendation: newRow.recommendation,
      needsApproval: newRow.needs_approval, approved: newRow.approved,
    };
    if (eventType === 'INSERT') session.tasks.push(taskData);
    else if (eventType === 'UPDATE') {
      const idx = session.tasks.findIndex(t => t.id === newRow.id);
      if (idx >= 0) session.tasks[idx] = taskData;
    } else if (eventType === 'DELETE') {
      session.tasks = session.tasks.filter(t => t.id !== oldRow.id);
    }
  } else if (table === 'agent_sessions' && eventType === 'UPDATE' && session) {
    session.currentStage = newRow.current_stage_idx || 0;
    session.totalTasks = newRow.total_tasks || 0;
    session.completedTasks = newRow.completed_tasks || 0;
    session.totalCost = newRow.total_cost_cents || 0;
    session.status = newRow.status || 'active';
  } else if (table === 'approval_queue') {
    if (eventType === 'INSERT' && newRow.status === 'pending') {
      session.approvals.unshift({
        id: newRow.id, agent: newRow.agent_key, desc: newRow.action_description,
        risk: newRow.risk_level, files: newRow.files_affected || [],
        status: newRow.status, details: newRow.details, created: new Date(newRow.created_at),
      });
    } else if (eventType === 'UPDATE') {
      if (newRow.status !== 'pending') {
        session.approvals = session.approvals.filter(a => a.id !== newRow.id);
      }
    }
  }

  renderAll();
}

async function approveItem(approvalId) {
  if (state.dataSource === 'supabase' && supabaseClient) {
    await supabaseClient.from('approval_queue').update({
      status: 'approved', decided_at: new Date().toISOString(),
    }).eq('id', approvalId);
  }
  state.sessions.forEach(s => { s.approvals = s.approvals.filter(a => a.id !== approvalId); });
  renderAll();
}

async function rejectItem(approvalId) {
  const reason = state.screenProfile === 'mobile' ? '' : (prompt('Rejection reason:') || '');
  if (state.dataSource === 'supabase' && supabaseClient) {
    await supabaseClient.from('approval_queue').update({
      status: 'rejected', decided_at: new Date().toISOString(), rejection_reason: reason,
    }).eq('id', approvalId);
  }
  state.sessions.forEach(s => { s.approvals = s.approvals.filter(a => a.id !== approvalId); });
  renderAll();
}

async function approveTask(taskId) {
  if (state.dataSource === 'supabase' && supabaseClient) {
    await supabaseClient.from('kanban_tasks').update({
      approved: true, column_name: 'todo', approved_at: new Date().toISOString(),
    }).eq('id', taskId);
  }
  state.sessions.forEach(s => {
    const t = s.tasks.find(t => t.id === taskId);
    if (t) { t.approved = true; t.column = 'todo'; }
  });
  renderAll();
}

// === SIMULATION ===
// === DATA (File Watch) ===
async function pollFileState() {
  try {
    const res = await fetch('agent_state.json?t=' + Date.now());
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();
    applyFileState(data);
    renderAll();
  } catch(e) {
    // Silent fail — file might not exist
  }
}

function applyFileState(data) {
  if (!data || !data.sessions) return;
  state.sessions = data.sessions.map((s, i) => {
    const color = SESSION_COLORS[i % SESSION_COLORS.length];
    return {
      id: s.id || crypto.randomUUID(),
      name: s.name || 'Session',
      color,
      status: s.status || 'active',
      currentStage: s.currentStage || 0,
      stages: s.stages || STAGES.map(n => ({name:n})),
      projectName: s.projectName || 'Unknown',
      totalTasks: s.totalTasks || 0,
      completedTasks: s.completedTasks || 0,
      budgetLimit: s.budgetLimit || 5000,
      totalCost: s.totalCost || 0,
      agents: (s.agents || []).map(a => ({
        id: a.id || crypto.randomUUID(), key: a.key || a.name?.toLowerCase() || 'agent',
        name: a.name || 'Agent', role: a.role || 'worker', icon: a.icon || '🤖',
        status: a.status || 'idle', task: a.task || '', ctx: a.ctx || 0,
        cost: a.cost || 0, msgs: a.msgs || 0, files: a.files || [],
        budgetLimit: a.budgetLimit,
      })),
      events: (s.events || []).map(e => ({
        id: e.id || crypto.randomUUID(), type: e.type || 'message',
        agent: e.agent || '', desc: e.desc || '', time: new Date(e.time || Date.now()),
      })),
      tasks: (s.tasks || []).map(t => ({
        id: t.id || crypto.randomUUID(), title: t.title || 'Task',
        desc: t.desc || '', tag: t.tag, priority: t.priority || 'medium',
        column: t.column || 'backlog', agent: t.agent,
        recommendation: t.recommendation, needsApproval: t.needsApproval || false,
        approved: t.approved || false,
      })),
      approvals: (s.approvals || []).map(a => ({
        id: a.id || crypto.randomUUID(), agent: a.agent || '',
        desc: a.desc || '', risk: a.risk || 'yellow',
        files: a.files || [], status: a.status || 'pending',
        created: new Date(a.created || Date.now()),
      })),
    };
  });
  if (state.sessions.length && !state.activeSessionId) {
    state.activeSessionId = state.sessions[0].id;
  }
}

// === RENDERING ===
function getActiveSession() {
  return state.sessions.find(s => s.id === state.activeSessionId) || state.sessions[0];
}

function renderAll() {
  renderSessionTabs();
  renderPanes();
  renderApprovalBadge();
}

function renderSessionTabs() {
  const container = document.getElementById('sessionTabs');
  const mobileSelect = document.getElementById('mobileSessionSelect');
  if (!container) return;

  container.innerHTML = state.sessions.map(s => `
    <button class="session-tab ${s.id === state.activeSessionId ? 'active' : ''}"
            onclick="switchSession('${escapeJsString(s.id)}')">
      <span class="dot" style="background:${s.color.dot}"></span>
      ${escapeHtml(s.name)}
      ${state.sessions.length > 1 ? `<span class="close-tab" onclick="event.stopPropagation();removeSession('${escapeJsString(s.id)}')">✕</span>` : ''}
    </button>
  `).join('');

  if (mobileSelect) {
    mobileSelect.innerHTML = state.sessions.map(s =>
      `<option value="${s.id}" ${s.id === state.activeSessionId ? 'selected' : ''}>${escapeHtml(s.name)}</option>`
    ).join('');
  }
}

function renderPanes() {
  const main = document.getElementById('main');
  const isMobile = state.screenProfile === 'mobile';
  const count = isMobile ? 1 : state.layoutCount;

  // Ensure activePaneViews has enough entries
  while (state.activePaneViews.length < count) state.activePaneViews.push('agents');

  let html = '';
  for (let i = 0; i < count; i++) {
    const view = isMobile ? state.mobileTab : state.activePaneViews[i];
    html += renderPane(i, view, isMobile);
  }
  main.innerHTML = html;

  // Re-attach drag handlers
  setupDragAndDrop();
}

function renderPane(index, view, isMobile) {
  const session = getActiveSession();
  if (!session) return '<div class="pane"><div class="pane-body"><p style="color:var(--text-3)">No session</p></div></div>';

  const paneHeader = !isMobile ? `
    <div class="pane-header">
      <button class="pane-tab ${view==='agents'?'active':''}" onclick="setPaneView(${index},'agents')">◉ Agents</button>
      <button class="pane-tab ${view==='kanban'?'active':''}" onclick="setPaneView(${index},'kanban')">▦ Kanban</button>
      <select class="pane-session-select topbar-select" onchange="setPaneSession(${index},this.value)">
        ${state.sessions.map(s => `<option value="${s.id}" ${s.id===state.activeSessionId?'selected':''}>${escapeHtml(s.name)}</option>`).join('')}
      </select>
    </div>` : '';

  let body = '';
  if (view === 'agents') body = renderAgentView(session);
  else if (view === 'kanban') body = renderKanbanView(session);
  else if (view === 'costs') body = renderCostView(session);
  else if (view === 'approvals') body = renderApprovalView(session);

  return `<div class="pane">${paneHeader}<div class="pane-body">${body}</div></div>`;
}

function renderAgentView(session) {
  const progress = session.totalTasks > 0 ? Math.round((session.completedTasks / session.totalTasks) * 100) : 0;
  const circumference = 2 * Math.PI * 18;
  const offset = circumference - (progress / 100) * circumference;
  const stageName = session.stages[session.currentStage]?.name || STAGES[session.currentStage] || 'Planning';

  const banner = `
    <div class="build-banner">
      <div class="ring-wrap">
        <svg class="progress-ring" viewBox="0 0 44 44">
          <circle class="progress-ring-bg" cx="22" cy="22" r="18"/>
          <circle class="progress-ring-fg" cx="22" cy="22" r="18"
                  stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="ring-pct">${progress}%</div>
      </div>
      <div>
        <div class="stage-name">${escapeHtml(stageName)}</div>
        <div class="project-name">${escapeHtml(session.projectName)}</div>
      </div>
      <div class="stats">
        <div><span class="val">${session.agents.length}</span> agents</div>
        <div><span class="val">${session.completedTasks}/${session.totalTasks}</span> tasks</div>
        <div><span class="val">$${(session.totalCost/100).toFixed(2)}</span> cost</div>
      </div>
    </div>`;

  const pipeline = `
    <div class="pipeline-row">
      ${STAGES.map((s, i) => {
        let cls = 'pipeline-stage';
        if (i < session.currentStage) cls += ' done';
        else if (i === session.currentStage) cls += ' active';
        return `<div class="${cls}">${s}</div>`;
      }).join('')}
    </div>`;

  const agents = `
    <div class="agent-grid">
      ${session.agents.map(a => renderAgentCard(a, session)).join('')}
    </div>`;

  const filteredEvents = filterEvents(session.events);
  const activity = `
    <div class="activity-header">
      <div class="activity-title">Activity Stream</div>
      <div class="activity-filters">
        ${['all','task','file','tool','message'].map(f =>
          `<button class="activity-filter ${state.activityFilter===f?'active':''}"
                   onclick="setActivityFilter('${f}')">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`
        ).join('')}
      </div>
    </div>
    <div class="activity-feed">
      ${filteredEvents.slice(0,50).map(e => renderEvent(e, session)).join('')}
    </div>`;

  return banner + pipeline + agents + activity;
}

function renderAgentCard(agent, session) {
  const isMobile = state.screenProfile === 'mobile';
  return `
    <div class="agent-card" onclick="${isMobile ? 'this.classList.toggle(\"expanded\")' : ''}">
      <div class="agent-avatar">${escapeHtml(agent.icon)}</div>
      <div class="agent-info">
        <div class="agent-name">
          ${escapeHtml(agent.name)}
          <span class="status-badge status-${escapeHtml(agent.status)}">${escapeHtml(agent.status)}</span>
        </div>
        <div class="agent-role">${escapeHtml(agent.role)}</div>
        <div class="agent-details">
          <div class="agent-task">${escapeHtml(agent.task)}</div>
          <div class="agent-metrics">
            <div class="metric">CTX <span class="val">${agent.ctx}%</span></div>
            <div class="metric">COST <span class="val">$${(agent.cost/100).toFixed(2)}</span></div>
            <div class="metric">MSGS <span class="val">${agent.msgs}</span></div>
          </div>
          ${agent.files.length ? `<div class="agent-files">Files: ${agent.files.map(f => `<span>${escapeHtml(f)}</span>`).join(', ')}</div>` : ''}
        </div>
      </div>
    </div>`;
}

function renderEvent(event, session) {
  const agent = session.agents.find(a => a.key === event.agent);
  const agentColor = agent ? getAgentColor(agent, session) : 'var(--text-2)';
  const time = event.time instanceof Date ? formatTime(event.time) : '';
  return `
    <div class="event-item event-type-${event.type}">
      <span class="event-time">${time}</span>
      <span class="event-icon"></span>
      <span class="event-agent" style="color:${agentColor}">${escapeHtml(event.agent)}</span>
      <span class="event-desc">${escapeHtml(event.desc)}</span>
    </div>`;
}

function renderKanbanView(session) {
  return `<div class="kanban-board">
    ${COLUMNS.map(col => {
      const tasks = session.tasks.filter(t => t.column === col);
      return `
        <div class="kanban-column">
          <div class="kanban-col-header">
            ${COLUMN_LABELS[col]}
            <span class="kanban-col-count">${tasks.length}</span>
          </div>
          <div class="kanban-col-body" data-column="${col}"
               ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${col}')">
            ${tasks.map(t => renderKanbanTask(t)).join('')}
          </div>
        </div>`;
    }).join('')}
  </div>`;
}

function renderKanbanTask(task) {
  const priorityIcon = PRIORITIES[task.priority] || '';
  return `
    <div class="kanban-task" draggable="true" data-task-id="${task.id}"
         ondragstart="onDragStart(event,'${task.id}')"
         ontouchstart="onTouchDragStart(event,'${task.id}')"
         ontouchmove="onTouchDragMove(event)" ontouchend="onTouchDragEnd(event,'${task.id}')">
      <div class="kanban-task-title">${escapeHtml(task.title)}</div>
      <div class="kanban-task-meta">
        ${task.tag ? `<span class="kanban-tag kanban-tag-${task.tag}">${task.tag}</span>` : ''}
        <span class="kanban-priority">${priorityIcon}</span>
        ${task.agent ? `<span class="kanban-agent">${escapeHtml(task.agent)}</span>` : ''}
        ${task.recommendation ? `<span class="kanban-recommend">🤖 rec</span>` : ''}
      </div>
      ${task.needsApproval && !task.approved ? `
        <button class="kanban-approve-btn" onclick="event.stopPropagation();approveTask('${escapeJsString(task.id)}')">
          ✓ Approve
        </button>` : ''}
    </div>`;
}

function renderCostView(session) {
  const totalBudget = session.budgetLimit || 5000;
  const totalUsed = session.totalCost;
  const pct = Math.min(100, Math.round((totalUsed / totalBudget) * 100));
  const barColor = pct > 80 ? 'var(--red)' : pct > 50 ? 'var(--amber)' : 'var(--green)';

  let html = `
    <div class="cost-card">
      <h3>Session Budget</h3>
      <div class="cost-row">
        <span>Total Spent</span>
        <span class="cost-val">$${(totalUsed/100).toFixed(2)}</span>
      </div>
      <div class="cost-row">
        <span>Budget Limit</span>
        <span class="cost-val">$${(totalBudget/100).toFixed(2)}</span>
      </div>
      <div class="cost-row">
        <span>Remaining</span>
        <span class="cost-val" style="color:${barColor}">$${((totalBudget - totalUsed)/100).toFixed(2)}</span>
      </div>
      <div class="cost-budget-bar">
        <div class="cost-budget-fill" style="width:${pct}%;background:${barColor}"></div>
      </div>
    </div>
    <div class="cost-card">
      <h3>Per-Agent Costs</h3>
      ${session.agents.map(a => {
        const aBudget = a.budgetLimit || 1000;
        const aPct = Math.min(100, Math.round((a.cost / aBudget) * 100));
        const aColor = aPct > 80 ? 'var(--red)' : aPct > 50 ? 'var(--amber)' : 'var(--green)';
        return `
          <div class="cost-row">
            <span>${escapeHtml(a.icon)} ${escapeHtml(a.name)}</span>
            <span class="cost-val">$${(a.cost/100).toFixed(2)} / $${(aBudget/100).toFixed(2)}</span>
          </div>
          <div class="cost-budget-bar" style="margin-bottom:8px">
            <div class="cost-budget-fill" style="width:${aPct}%;background:${aColor}"></div>
          </div>`;
      }).join('')}
    </div>`;

  // Burn rate
  const sessionStart = session.agents.length > 0 ? Date.now() - 3600000 : Date.now(); // approximate
  const hoursElapsed = Math.max(0.1, (Date.now() - sessionStart) / 3600000);
  const burnRate = totalUsed / hoursElapsed / 100;

  html += `
    <div class="cost-card">
      <h3>Burn Rate</h3>
      <div class="cost-row">
        <span>Current Rate</span>
        <span class="cost-val">~$${burnRate.toFixed(2)}/hr</span>
      </div>
    </div>`;

  return html;
}

function renderApprovalView(session) {
  const pending = session.approvals.filter(a => a.status === 'pending');
  if (pending.length === 0) {
    return '<div class="approval-empty">No pending approvals</div>';
  }
  return pending.map(a => `
    <div class="approval-card">
      <span class="risk-badge risk-${a.risk}">${a.risk === 'red' ? '🔴' : a.risk === 'yellow' ? '🟡' : '🟢'} ${a.risk}</span>
      <div class="approval-desc">${escapeHtml(a.desc)}</div>
      <div class="approval-agent">Agent: <strong>${escapeHtml(a.agent)}</strong></div>
      ${a.files.length ? `<div class="approval-files">${a.files.map(f => escapeHtml(f)).join(', ')}</div>` : ''}
      <div class="approval-actions">
        <button class="btn-approve" onclick="approveItem('${escapeJsString(a.id)}')">✓ Approve</button>
        <button class="btn-reject" onclick="rejectItem('${escapeJsString(a.id)}')">✕ Reject</button>
      </div>
    </div>
  `).join('');
}

function renderApprovalBadge() {
  const session = getActiveSession();
  const badge = document.getElementById('approvalBadge');
  if (!badge || !session) return;
  const count = session.approvals.filter(a => a.status === 'pending').length;
  badge.textContent = count;
  badge.classList.toggle('hidden', count === 0);
}

// === MOBILE ===
function switchMobileTab(tab) {
  state.mobileTab = tab;
  document.querySelectorAll('.bottomnav-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  renderPanes();
}

function toggleMobileMenu() {
  state.mobileMenuOpen = !state.mobileMenuOpen;
  document.getElementById('mobileMenu').classList.toggle('open', state.mobileMenuOpen);
}

// Pull-to-refresh
let ptrStartY = 0;
let ptrActive = false;
let ptrListenersAttached = false;
function setupPullToRefresh() {
  if (state.screenProfile !== 'mobile') return;
  if (ptrListenersAttached) return;
  ptrListenersAttached = true;
  const main = document.getElementById('main');
  main.addEventListener('touchstart', e => {
    if (state.screenProfile !== 'mobile') return;
    if (main.scrollTop === 0) {
      ptrStartY = e.touches[0].clientY;
      ptrActive = true;
    }
  }, { passive: true });
  main.addEventListener('touchmove', e => {
    if (!ptrActive) return;
    const diff = e.touches[0].clientY - ptrStartY;
    if (diff > 80) {
      ptrActive = false;
      refreshData();
    }
  }, { passive: true });
  main.addEventListener('touchend', () => { ptrActive = false; }, { passive: true });
}

async function refreshData() {
  if (state.dataSource === 'supabase') await loadFromSupabase();
  else if (state.dataSource === 'file') await pollFileState();
  renderAll();
}

// === DRAG & DROP ===
let draggedTaskId = null;

function onDragStart(e, taskId) {
  draggedTaskId = taskId;
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
}

function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e, column) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!draggedTaskId) return;
  moveTask(draggedTaskId, column);
  draggedTaskId = null;
}

// Touch drag for mobile
let touchDragEl = null;
let touchDragClone = null;

function onTouchDragStart(e, taskId) {
  draggedTaskId = taskId;
  touchDragEl = e.target.closest('.kanban-task');
  // Create visual clone
  touchDragClone = touchDragEl.cloneNode(true);
  touchDragClone.style.cssText = 'position:fixed;z-index:1000;opacity:0.8;pointer-events:none;width:'+touchDragEl.offsetWidth+'px;';
  document.body.appendChild(touchDragClone);
}

function onTouchDragMove(e) {
  if (!touchDragClone) return;
  const touch = e.touches[0];
  touchDragClone.style.left = (touch.clientX - 40) + 'px';
  touchDragClone.style.top = (touch.clientY - 20) + 'px';
}

function onTouchDragEnd(e, taskId) {
  if (touchDragClone) {
    touchDragClone.remove();
    touchDragClone = null;
  }
  if (!draggedTaskId) return;
  // Determine drop target by position
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const colBody = el?.closest('.kanban-col-body');
  if (colBody) {
    const column = colBody.dataset.column;
    moveTask(draggedTaskId, column);
  }
  draggedTaskId = null;
}

async function moveTask(taskId, newColumn) {
  const session = getActiveSession();
  if (!session) return;
  const task = session.tasks.find(t => t.id === taskId);
  if (!task || task.column === newColumn) return;

  task.column = newColumn;

  if (state.dataSource === 'supabase' && supabaseClient) {
    await supabaseClient.from('kanban_tasks').update({
      column_name: newColumn, updated_at: new Date().toISOString(),
    }).eq('id', taskId);
  }

  renderAll();
}

function setupDragAndDrop() {
  // Touch drag is handled via inline event handlers
}

// === EVENTS ===
function filterEvents(events) {
  if (state.activityFilter === 'all') return events;
  return events.filter(e => e.type === state.activityFilter);
}

function setActivityFilter(filter) {
  state.activityFilter = filter;
  renderAll();
}

// === HELPERS ===
function formatTime(date) {
  if (!(date instanceof Date) || isNaN(date)) return '';
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function escapeJsString(str) {
  if (!str) return '';
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/</g, '\\x3c');
}

function getAgentColor(agent, session) {
  const colors = ['var(--cyan)','var(--green)','var(--violet)','var(--amber)','var(--rose)','var(--blue)'];
  const idx = session.agents.indexOf(agent);
  return colors[idx % colors.length];
}

// === UI ACTIONS ===
function setScreen(profile) {
  state.screenProfile = profile;
  document.documentElement.className = 'screen-' + profile;

  // Constrain layout
  const maxPanes = { mobile: 1, laptop: 2, desktop: 3, ultrawide: 4 }[profile] || 2;
  if (state.layoutCount > maxPanes) state.layoutCount = maxPanes;

  // Update active buttons
  document.querySelectorAll('[data-screen]').forEach(b => b.classList.toggle('active', b.dataset.screen === profile));
  updateLayoutButtons();

  if (profile === 'mobile') setupPullToRefresh();
  renderAll();
}

function setLayout(count) {
  const maxPanes = { mobile: 1, laptop: 2, desktop: 3, ultrawide: 4 }[state.screenProfile] || 2;
  state.layoutCount = Math.min(count, maxPanes);
  updateLayoutButtons();
  renderAll();
}

function updateLayoutButtons() {
  document.querySelectorAll('[data-layout]').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.layout) === state.layoutCount);
  });
}

function setPaneView(index, view) {
  state.activePaneViews[index] = view;
  renderAll();
}

function setPaneSession(index, sessionId) {
  // For multi-pane independent sessions — simplified to switch active session
  switchSession(sessionId);
}

function switchSession(sessionId) {
  state.activeSessionId = sessionId;
  state.mobileMenuOpen = false;
  document.getElementById('mobileMenu')?.classList.remove('open');
  renderAll();
}

function addSession() {
  // Sessions are created via Supabase or file state — no client-side creation
  renderAll();
}

function removeSession(sessionId) {
  if (state.sessions.length <= 1) return;
  state.sessions = state.sessions.filter(s => s.id !== sessionId);
  if (state.activeSessionId === sessionId) {
    state.activeSessionId = state.sessions[0]?.id;
  }
  renderAll();
}

let switchingSource = false;
async function switchDataSource(source) {
  if (switchingSource) return;
  switchingSource = true;
  try {
    // Stop existing timers
    if (filePollTimer) { clearInterval(filePollTimer); filePollTimer = null; }
    supabaseSubscriptions.forEach(s => s.unsubscribe());
    supabaseSubscriptions = [];

    state.dataSource = source;
    document.getElementById('dataSourceSelect').value = source;

    if (source === 'supabase') {
      const ok = await loadFromSupabase();
      if (ok) {
        subscribeRealtime();
      } else {
        alert('Supabase connection failed. Switching to File Watch.');
        state.dataSource = 'file';
        document.getElementById('dataSourceSelect').value = 'file';
        await pollFileState();
        filePollTimer = setInterval(pollFileState, FILE_POLL_INTERVAL);
      }
    } else if (source === 'file') {
      await pollFileState();
      filePollTimer = setInterval(pollFileState, FILE_POLL_INTERVAL);
    }

    renderAll();
  } finally {
    switchingSource = false;
  }
}

// === KEYBOARD SHORTCUTS ===
document.addEventListener('keydown', e => {
  if (state.screenProfile === 'mobile') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

  const key = e.key.toUpperCase();
  if (key === 'L') setScreen('laptop');
  else if (key === 'D') setScreen('desktop');
  else if (key === 'U') setScreen('ultrawide');
  else if (key >= '1' && key <= '4') setLayout(parseInt(key));
  else if (key === 'A') { state.activePaneViews[0] = 'agents'; renderAll(); }
  else if (key === 'K') { state.activePaneViews[0] = 'kanban'; renderAll(); }
});

// === INIT ===
(async function init() {
  // Detect screen profile
  const w = window.innerWidth;
  if (w < 768) setScreen('mobile');
  else if (w <= 1440) setScreen('laptop');
  else if (w <= 2560) setScreen('desktop');
  else setScreen('ultrawide');

  // Set default layout
  setLayout(2);

  // Init Supabase client and load data
  initSupabase();
  const ok = await loadFromSupabase();
  if (ok) {
    subscribeRealtime();
  } else {
    // Fall back to file watch
    state.dataSource = 'file';
    document.getElementById('dataSourceSelect').value = 'file';
    await pollFileState();
    filePollTimer = setInterval(pollFileState, FILE_POLL_INTERVAL);
  }

  renderAll();

  // Listen for resize
  window.addEventListener('resize', () => {
    if (window.matchMedia('(max-width: 767px)').matches && state.screenProfile !== 'mobile') {
      setScreen('mobile');
    }
  });
})();
</script>
