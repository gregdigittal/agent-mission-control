# =============================================================================
# nginx.conf — Agent Mission Control
# =============================================================================
#
# Terminates TLS (via certbot/Let's Encrypt) and proxies to the MVP dashboard
# running on port 8090. Optionally proxies the React app on a subdomain.
#
# Replace YOURDOMAIN.COM with your actual domain before use.
#
# Usage:
#   sudo cp nginx.conf /etc/nginx/sites-available/agent-mission-control
#   sudo ln -s /etc/nginx/sites-available/agent-mission-control \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Issue a certificate with certbot:
#   sudo certbot --nginx -d YOURDOMAIN.COM
#
# Install nginx + certbot:
#   sudo apt install nginx certbot python3-certbot-nginx
# =============================================================================


# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name YOURDOMAIN.COM;

    # Let certbot manage this block during certificate issuance
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ---------------------------------------------------------------------------
# HTTPS — MVP Dashboard (proxied from port 8090)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOURDOMAIN.COM;

    # TLS certificates — managed by certbot
    # Run: sudo certbot --nginx -d YOURDOMAIN.COM
    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.COM/privkey.pem;

    # Modern TLS settings (Mozilla Intermediate compatibility)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    # Proxy to the dashboard (python3 -m http.server 8090 or Caddy-equivalent)
    location / {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Logging
    access_log /var/log/nginx/agent-mc-access.log;
    error_log  /var/log/nginx/agent-mc-error.log;
}


