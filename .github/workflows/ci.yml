name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Dashboard Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check index.html exists
        run: test -s index.html
      - name: No innerHTML (security gate)
        run: |
          if grep -n "\.innerHTML" index.html; then
            echo "ERROR: innerHTML found" && exit 1
          fi
          echo "PASS: no innerHTML"
      - name: No hardcoded secrets
        run: |
          if grep -Ei "(api_key|secret|password)\s*=\s*['\"][^'\"]{8,}" index.html; then
            echo "ERROR: Possible hardcoded secret" && exit 1
          fi
          echo "PASS: secret scan clean"
      - name: No hardcoded JWTs (dashboard)
        run: |
          if grep -E "eyJ[a-zA-Z0-9_-]{10,}" dashboard/index.html; then
            echo "ERROR: Hardcoded JWT found in dashboard/index.html" && exit 1
          fi
          echo "PASS: no JWT in dashboard"

  bridge:
    name: Bridge — type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bridge/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Security audit — no network listeners
        run: |
          if grep -r "http.createServer\|net.listen\|express()\|fastify\|app.listen" src/; then
            echo "FAIL: network listener found" && exit 1
          fi
          echo "PASS: no network listeners"
      - name: Audit log safety check
        run: |
          if grep -r "writeFile\|unlink\|truncate" src/audit/logger.ts; then
            echo "FAIL: destructive op in audit logger" && exit 1
          fi
          echo "PASS: audit logger clean"
      - run: npm test
      - run: npm run build

  app:
    name: App — type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Type check
        run: npx tsc --noEmit
      - name: Credential safety check
        run: |
          if grep -rE "eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+" src/; then
            echo "FAIL: hardcoded JWT found" && exit 1
          fi
          echo "PASS: no hardcoded credentials"
      - run: npm test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key-for-build

  bridge-remote:
    name: Bridge Remote — type-check, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge-remote
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bridge-remote/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  mcp-server:
    name: MCP Server — type-check, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t agent-mission-control:ci .

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [app, bridge, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://agent-mission-control-ruddy.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel --prod --token "$VERCEL_TOKEN" --yes
